<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pong Game</title>
    <script src="https://cjrtnc.leaningtech.com/4.3/loader.js"></script>

  <body>
    <script>
      (async function () {

        await cheerpjRunJar(jarPath);
      })();
