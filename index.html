<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pong Game</title>
    <script src="https://cjrtnc.leaningtech.com/4.3/loader.js"></script>

    <style>
  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
  }

  body {
  display: flex;
  justify-content: center;
  align-items: center;
  background: #202020;
}

  canvas {
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
  }
</style>
  </head>

  <body>
    <script>
      (async function () {
        await cheerpjInit({ version: 11 });
        cheerpjCreateDisplay(900, 600);

        const jarPath = "/app" + new URL("ponggame.jar", window.location.href).pathname;
        await cheerpjRunJar(jarPath);
      })();
    </script>
  </body>
</html>
